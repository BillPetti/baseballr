on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
      - development_branch
  schedule:
    - cron: "30 12 * * Fri"

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest, r: "release" }
          - { os: windows-latest, r: "release" }
          # - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - { os: ubuntu-latest, r: "release" }
          - { os: ubuntu-latest, r: "oldrel-1" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Enable the source-gated live-API tests in CI (see
      # tests/testthat/helper-skip.R). Set a value to "0" (or remove it) to
      # skip that source's tests -- e.g. if FanGraphs is 403-ing or you do not
      # want CI hitting the NCAA stats site.
      FANGRAPHS_TESTS: "1"
      MLB_STATS_TESTS: "1"
      BREF_TESTS: "0"
      STATCAST_TESTS: "1"
      NCAA_BASEBALL_TESTS: "0"
      SPOTRAC_TESTS: "1"
      CHADWICK_TESTS: "1"
      BASEBALLR_LOAD_TESTS: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
